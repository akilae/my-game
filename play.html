<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>霓虹消磚塊</title>
    <script src="[https://cdn.tailwindcss.com](https://cdn.tailwindcss.com)"></script>
    <style>
        body { touch-action: none; overflow: hidden; background-color: #020617; color: white; }
        canvas { display: block; touch-action: none; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">
    <div class="absolute top-6 left-0 right-0 flex justify-around z-10 pointer-events-none">
        <div class="text-center"><p class="text-xs text-cyan-500 font-bold">SCORE</p><p id="scoreText" class="text-2xl font-black">0</p></div>
        <div id="livesContainer" class="text-center"><p class="text-xs text-pink-500 font-bold">LIVES</p><p id="livesText" class="text-2xl">❤❤❤</p></div>
    </div>
    <canvas id="gameCanvas"></canvas>
    <div id="overlay" class="fixed inset-0 bg-slate-950/90 flex flex-col items-center justify-center z-20">
        <h1 class="text-5xl font-black text-cyan-400 mb-8 italic">NEON STRIKE</h1>
        <button onclick="startGame()" class="px-12 py-4 bg-cyan-500 text-slate-950 font-black rounded-2xl text-xl">開始遊戲</button>
    </div>
    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const overlay = document.getElementById("overlay");
        let score = 0, lives = 3, running = false;
        let paddleW = 100, paddleX, ballX, ballY, dx = 5, dy = -5;
        let bricks = [];

        function startGame() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            paddleX = (canvas.width - paddleW) / 2;
            ballX = canvas.width / 2; ballY = canvas.height - 100;
            bricks = [];
            const cols = Math.floor(canvas.width / 80);
            for(let c=0; c<cols; c++) {
                bricks[c] = [];
                for(let r=0; r<4; r++) bricks[c][r] = { status: 1 };
            }
            score = 0; lives = 3; running = true;
            overlay.style.display = 'none';
            draw();
        }

        function draw() {
            if(!running) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            bricks.forEach((col, i) => col.forEach((b, j) => {
                if(b.status === 1) {
                    let bx = i * 80 + 10, by = j * 30 + 100;
                    ctx.fillStyle = `hsl(${i * 45}, 70%, 50%)`;
                    ctx.fillRect(bx, by, 70, 20);
                    if(ballX > bx && ballX < bx+70 && ballY > by && ballY < by+20) {
                        dy = -dy; b.status = 0; score += 10;
                        document.getElementById("scoreText").innerText = score;
                    }
                }
            }));
            ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(ballX, ballY, 8, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#22d3ee"; ctx.fillRect(paddleX, canvas.height-40, paddleW, 10);
            if(ballX + dx > canvas.width || ballX + dx < 0) dx = -dx;
            if(ballY + dy < 0) dy = -dy;
            else if(ballY + dy > canvas.height - 40) {
                if(ballX > paddleX && ballX < paddleX + paddleW) dy = -dy;
                else if(ballY > canvas.height) {
                    lives--; document.getElementById("livesText").innerText = "❤".repeat(lives);
                    if(lives <= 0) { running = false; location.reload(); }
                    else { ballX = canvas.width/2; ballY = canvas.height-100; dy = -5; }
                }
            }
            ballX += dx; ballY += dy;
            requestAnimationFrame(draw);
        }
